    <div class="main-container">
      <div class="input-group">
        <textarea rows="4" cols="25" placeholder="Enter 'payment' to proceed" id="usertext" required></textarea>
        <span id="usertext-error"></span>

        <input type="email" placeholder="Enter your email" id="useremail" required/>
        <span id="useremail-error"></span>
      </div>

      <div class="userbutton">
        <button onclick="RollinUser()" id="user-button">send</button>
      </div>
    </div>

<script type="text/javascript" charset="utf-8">
  function RollinUser() { 
    const utext = document.getElementById('usertext').value; 
    const umail = document.getElementById('useremail').value; 
    const utexterr = document.getElementById('usertext-error'); 
    const umailerr = document.getElementById('useremail-error'); 

    // Clear old errors
    utexterr.textContent = "";
    umailerr.textContent = "";

    if (utext == null || utext.trim() == "" || utext.toLowerCase() !== "payment") { 
        utexterr.textContent = "please, enter payment"; 
        return; 
    } else if (umail == null || umail.trim() == "" || !umail.includes("@")) { 
        umailerr.textContent = "Valid email required"; 
        return;
    } 

    // If validation passes, send to backend
    fetch('/api/create-payment', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify({ 
        email: umail.trim(), 
        amount: 560000, // 5600.00 naira in kobo, $4 0cents
        product: "Website Automation" 
      }) 
    }) 
    .then(res => res.json()) 
    .then(data => { 
      if(data.status === true){ 
        alert('Payment link has been sent to your email: ' + umail); 
        document.getElementById('usertext').value = "";
        document.getElementById('useremail').value = "";
      } else { 
        alert("Error: " + data.message); 
      } 
    })
    .catch(error => {
      alert("Network error. Please try again.");
    })
  }
</script>
